name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TASK_VERSION: v3.51.1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Task
        run: go install github.com/go-task/task/v3/cmd/task@${TASK_VERSION}

      - name: Run checks
        run: task check

      - name: Run race tests
        run: task race

      - name: Build CLI
        run: task build

      - name: Generate coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          fail_ci_if_error: false
