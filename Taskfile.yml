version: "3"

vars:
  BINARY_NAME: vecgrep
  BUILD_DIR: ./bin
  AIR_VERSION: v1.65.3
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo unknown
  BUILD_TIME:
    sh: date -u '+%Y-%m-%dT%H:%M:%SZ'
  LDFLAGS: >-
    -X github.com/abdul-hamid-achik/vecgrep/internal/version.Version={{.VERSION}}
    -X github.com/abdul-hamid-achik/vecgrep/internal/version.Commit={{.COMMIT}}
    -X github.com/abdul-hamid-achik/vecgrep/internal/version.Date={{.BUILD_TIME}}

env:
  CGO_ENABLED: "0"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  doctor:
    desc: Check local development prerequisites
    cmds:
      - |
        echo "vecgrep doctor"
        echo ""
        command -v go >/dev/null && echo "ok go $(go version | awk '{print $3}')" || echo "missing go"
        command -v ollama >/dev/null && echo "ok ollama" || echo "missing ollama"
        command -v bun >/dev/null && echo "ok bun $(bun --version)" || echo "missing bun"
        command -v air >/dev/null && echo "ok air" || echo "missing air (run: task tools)"
        command -v glyph >/dev/null && echo "ok glyph" || echo "missing glyph"
        command -v golangci-lint >/dev/null && echo "ok golangci-lint" || echo "missing golangci-lint (go vet fallback will run)"
        curl -sf http://localhost:11434/api/tags >/dev/null 2>&1 && echo "ok ollama server" || echo "offline ollama server"
        ollama list 2>/dev/null | grep -q nomic-embed-text && echo "ok nomic-embed-text" || echo "missing nomic-embed-text"
        [ -f "{{.BUILD_DIR}}/{{.BINARY_NAME}}" ] && echo "ok binary" || echo "missing binary (run: task build)"

  setup:
    desc: Install dependencies and local tools
    cmds:
      - task: deps
      - task: site:deps
      - task: tools

  deps:
    desc: Download and tidy Go modules
    cmds:
      - go mod download
      - go mod tidy
    sources:
      - go.mod
      - go.sum
    method: checksum

  tools:
    desc: Install Go development tools
    cmds:
      - go install github.com/air-verse/air@{{.AIR_VERSION}}
    status:
      - command -v air

  fmt:
    desc: Format Go code
    aliases: [format]
    cmds:
      - go fmt ./...

  lint:
    desc: Run linters
    cmds:
      - |
        if command -v golangci-lint >/dev/null; then
          golangci-lint run ./...
        else
          go vet ./...
          test -z "$(gofmt -l .)"
        fi

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  verbose:
    desc: Run tests with verbose output
    aliases: [tv]
    cmds:
      - go test -v ./...

  short:
    desc: Run short tests
    cmds:
      - go test -short ./...

  race:
    desc: Run tests with the race detector
    env:
      CGO_ENABLED: "1"
    cmds:
      - go test -race ./...

  cov:
    desc: Generate coverage report
    aliases: [coverage]
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - open coverage.html || true

  check:
    desc: Run format, lint, and tests
    aliases: [ci, verify]
    cmds:
      - task: fmt
      - task: lint
      - task: test

  build:
    desc: Build the vecgrep binary
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BUILD_DIR}}/{{.BINARY_NAME}} ./cmd/vecgrep
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BUILD_DIR}}/{{.BINARY_NAME}}"

  release:
    desc: Build an optimized release binary
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -ldflags "{{.LDFLAGS}} -s -w" -trimpath -o {{.BUILD_DIR}}/{{.BINARY_NAME}} ./cmd/vecgrep

  install:
    desc: Install vecgrep to GOPATH/bin
    cmds:
      - go install -ldflags "{{.LDFLAGS}}" ./cmd/vecgrep

  dev:
    desc: Start hot reload development
    cmds:
      - task: air

  air:
    desc: Run Air
    cmds:
      - air

  run:
    desc: Run the built binary with extra args
    deps: [build]
    cmds:
      - "{{.BUILD_DIR}}/{{.BINARY_NAME}} {{.CLI_ARGS}}"

  flow:
    desc: Run one terminal flow with FLOW=specs/flows/name.yml
    deps: [build]
    requires:
      vars: [FLOW]
    cmds:
      - glyph run "{{.FLOW}}" --format md --progress auto {{.CLI_ARGS}}

  flows:
    desc: Run all terminal flows
    deps: [build]
    cmds:
      - glyph run specs/flows/*.yml --format md --progress auto {{.CLI_ARGS}}

  bench:embeddings:
    desc: Compare embedding presets on the labeled retrieval corpus
    deps: [build]
    cmds:
      - ./bin/{{.BINARY_NAME}} benchmark embeddings --root . {{.CLI_ARGS}}

  site:
    desc: Start the VitePress docs site
    deps: [site:deps]
    cmds:
      - bun run site -- {{.CLI_ARGS}}

  site:deps:
    desc: Install docs site dependencies with Bun
    cmds:
      - bun install
    status:
      - test -d node_modules
      - test -f bun.lock

  site:build:
    desc: Build the VitePress docs site
    deps: [site:deps]
    cmds:
      - bun run site:build

  site:preview:
    desc: Preview the built VitePress docs site
    deps: [site:deps]
    cmds:
      - bun run site:preview -- {{.CLI_ARGS}}

  ship:
    desc: Run the local release verification pipeline
    cmds:
      - task: check
      - task: site:build
      - task: race
      - task: build
      - task: flows

  wtf:
    desc: Print quick debug information
    cmds:
      - go build -o /dev/null ./cmd/vecgrep 2>&1 || true
      - go test ./... 2>&1 | grep -E "(FAIL|PASS|---)" | head -20 || echo "tests passing"
      - git log --oneline -5 2>/dev/null || true

  ollama:
    desc: Start Ollama with Metal GPU support
    env:
      OLLAMA_METAL: "1"
      OLLAMA_HOST: 0.0.0.0
    cmds:
      - ollama serve

  image:
    desc: Build the Docker image
    cmds:
      - docker build -t vecgrep:{{.VERSION}} -t vecgrep:latest .

  container:
    desc: Run the Docker image with extra args
    cmds:
      - docker run --rm -v $(pwd):/workspace vecgrep:latest {{.CLI_ARGS}}

  up:
    desc: Start the Compose stack
    cmds:
      - docker compose up -d

  down:
    desc: Stop the Compose stack
    cmds:
      - docker compose down

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}
      - rm -rf tmp dist .task .glyphrun
      - rm -rf docs/.vitepress/dist docs/.vitepress/cache
      - rm -f coverage.out coverage.html
      - rm -f {{.BINARY_NAME}}

  reset:
    desc: Reset the current project's global index
    cmds:
      - task: build
      - "{{.BUILD_DIR}}/{{.BINARY_NAME}} init --global --force"
      - "{{.BUILD_DIR}}/{{.BINARY_NAME}} reset --force"

  nuke:
    desc: Remove build artifacts and repo-local legacy database
    prompt: This will delete build artifacts and any repo-local .vecgrep directory. Continue?
    cmds:
      - task: clean
      - rm -rf .vecgrep/
