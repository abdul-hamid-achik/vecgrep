services:
  vecgrep:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: vecgrep
    volumes:
      - ./.vecgrep:/data/.vecgrep
      - ./:/workspace:ro
    environment:
      - VECGREP_DATA_DIR=/data
      - VECGREP_OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["vecgrep", "--help"]
