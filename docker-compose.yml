services:
  vecgrep:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: vecgrep
    volumes:
      - vecgrep-home:/home/vecgrep/.vecgrep
      - ./:/workspace:ro
    working_dir: /workspace
    environment:
      - VECGREP_OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["vecgrep", "--help"]

volumes:
  vecgrep-home:
